<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cordova Summer School 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap');
:root{--navy:#0a0a1a;--blue:#1a3a6a;--lb:#1e2a42;--gold:#F4B942;--green:#2ecc71;--red:#e74c3c;--orange:#f39c12;--purple:#9b59b6;--text:#e8e8f0;--textl:#a0a0b8;--bg:#0d0d1f;--card:#141428;--card-border:#1e1e38;--accent-glow:rgba(244,185,66,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.7}

/* Profile Selector */
.profile-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(180deg,#0a0a1a 0%,#0d1528 50%,#0a0a1a 100%);color:#fff;text-align:center;padding:20px}
.profile-screen h1{font-family:'Space Grotesk',sans-serif;font-size:2.8rem;margin-bottom:12px;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,#a0a0c0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.profile-screen p{opacity:.5;margin-bottom:50px;font-size:1.1rem;font-weight:400;letter-spacing:.5px;text-transform:uppercase}
.profile-cards{display:flex;gap:32px;flex-wrap:wrap;justify-content:center}
.profile-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px 50px;cursor:pointer;transition:all .4s;min-width:220px;backdrop-filter:blur(10px)}
.profile-card:hover{background:rgba(244,185,66,.06);transform:translateY(-6px);border-color:var(--gold);box-shadow:0 20px 60px rgba(244,185,66,.1)}
.profile-card .avatar{font-size:4.5rem;margin-bottom:16px}
.profile-card .name{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:#fff}
.profile-card .grade{font-size:.9rem;opacity:.5;margin-top:6px;letter-spacing:.3px}

/* Top Banner */
.banner{background:linear-gradient(135deg,#0d1528 0%,#0a1020 100%);color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.banner h1{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:-.3px;opacity:.9}
.banner .sub{font-size:.82rem;opacity:.4;font-weight:400}
.banner-right{display:flex;align-items:center;gap:14px}
.week-badge{background:var(--gold);color:#0a0a1a;padding:7px 18px;border-radius:16px;font-weight:700;font-size:.85rem}
.switch-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:7px 16px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;transition:all .2s}
.switch-btn:hover{background:rgba(255,255,255,.1);color:#fff}

/* Nav */
.nav{background:rgba(10,10,26,.95);border-bottom:1px solid rgba(255,255,255,.06);display:flex;overflow-x:auto;padding:0 16px;backdrop-filter:blur(10px)}
.nav button{padding:14px 18px;border:none;background:none;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;color:var(--textl);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.nav button:hover{color:#fff}
.nav button.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Main */
.main{max-width:860px;margin:0 auto;padding:28px 20px}
.sec{display:none}.sec.active{display:block}

/* Day Selector */
.day-bar{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.day-btn{width:60px;height:48px;border-radius:12px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.85rem;color:var(--textl);cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2}
.day-btn:hover{border-color:var(--gold);color:#fff}
.day-btn.active{background:var(--gold);color:#0a0a1a;border-color:var(--gold);box-shadow:0 4px 16px rgba(244,185,66,.3)}
.day-btn.done{background:rgba(46,204,113,.15);border-color:var(--green);color:var(--green)}
.day-btn .day-check{font-size:.6rem}

/* Progress Bar */
.progress-wrap{margin-bottom:24px}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:.9rem;font-weight:600}
.progress-label .pct{color:var(--gold);font-family:'Space Grotesk',sans-serif;font-size:1.1rem}
.progress-track{height:12px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#f7c948);border-radius:10px;transition:width .5s ease;width:0%}
.progress-fill.complete{background:linear-gradient(90deg,var(--green),#48d98a)}

/* Cards */
.card{background:var(--card);border-radius:16px;padding:28px;margin-bottom:20px;border:1px solid var(--card-border);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card h2{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-.3px}
.card h3{font-size:1.05rem;font-weight:600;color:var(--gold);margin:18px 0 10px}
.card p{color:var(--textl);font-size:.95rem;line-height:1.7;margin-bottom:12px}

/* Block Cards */
.block-row{display:grid;gap:14px;margin:18px 0}
.block-item{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:22px;transition:all .3s;position:relative;cursor:default}
.block-item:hover{border-color:rgba(244,185,66,.3);box-shadow:0 4px 20px rgba(244,185,66,.06)}
.block-item.done{border-color:var(--green);background:rgba(46,204,113,.05)}
.block-item.done .block-name,.block-item.done .block-desc{opacity:.6}
.block-item.done .block-done-badge{display:inline-flex}
.block-done-badge{display:none;align-items:center;gap:4px;background:var(--green);color:#fff;padding:3px 10px;border-radius:8px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.block-label{display:flex;align-items:center;gap:10px}
.block-icon{font-size:1.6rem}
.block-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.05rem;color:#fff}
.block-time{font-size:.78rem;color:var(--textl);background:rgba(255,255,255,.06);padding:4px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08)}
.block-desc{font-size:.95rem;color:var(--textl);line-height:1.7;margin-bottom:8px}
.block-tip{font-size:.85rem;color:var(--gold);font-weight:600;margin-bottom:14px;padding:8px 14px;background:rgba(244,185,66,.06);border-radius:10px;border-left:3px solid var(--gold)}
.block-links{display:flex;gap:10px;flex-wrap:wrap}
.block-link{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:.85rem;font-weight:600;text-decoration:none;transition:all .25s;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.block-link:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.link-ixl{background:linear-gradient(135deg,#2E5090,#1a3a6a);color:#fff}
.link-khan{background:linear-gradient(135deg,#14BF96,#0d9b7a);color:#fff}
.link-epic{background:linear-gradient(135deg,#FF6B35,#e0552a);color:#fff}
.link-typing{background:linear-gradient(135deg,#9B59B6,#7d3c98);color:#fff}
.link-scratch{background:linear-gradient(135deg,#F7A41D,#d4891a);color:#0a0a1a}
.link-other{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
.link-spanish{background:linear-gradient(135deg,#E74C3C,#C0392B);color:#fff}
.link-vocab{background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff}
.link-start{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.link-check{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}

.block-check{width:26px;height:26px;accent-color:var(--green);cursor:pointer;flex-shrink:0}

/* Prompt Boxes */
.prompt{background:rgba(255,255,255,.03);border:1px solid rgba(244,185,66,.2);border-radius:14px;padding:22px;margin:16px 0;text-align:center}
.prompt .q{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:12px;line-height:1.4}
.prompt textarea,.prompt input[type=text]{width:100%;padding:14px;border:1px solid rgba(255,255,255,.1);border-radius:10px;font-family:'Inter',sans-serif;font-size:1rem;resize:vertical;min-height:60px;background:rgba(255,255,255,.04);color:#fff;line-height:1.6}
.prompt textarea:focus,.prompt input:focus{border-color:var(--gold);outline:none;background:rgba(244,185,66,.04)}
.prompt textarea::placeholder,.prompt input::placeholder{color:rgba(255,255,255,.25)}
.prompt input[type=text]{min-height:unset}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn-blue{background:linear-gradient(135deg,#2E5090,#1a3a6a);color:#fff}
.btn-green{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn-gold{background:var(--gold);color:#0a0a1a}
.btn-red{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.btn-lg{padding:16px 32px;font-size:1.05rem}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* Next/Prev nav */
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)}
.step-nav .btn{min-width:140px;justify-content:center}

/* Mood */
.mood-row{display:flex;gap:12px;justify-content:center;margin:16px 0}
.mood-btn{width:54px;height:54px;border-radius:50%;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-size:1.5rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center}
.mood-btn:hover{border-color:var(--gold);transform:scale(1.1);background:rgba(244,185,66,.06)}
.mood-btn.sel{border-color:var(--gold);background:rgba(244,185,66,.12);transform:scale(1.15);box-shadow:0 0 20px rgba(244,185,66,.15)}

/* Timer */
.timer-box{text-align:center;padding:24px}
.timer-num{font-family:'Space Grotesk',sans-serif;font-size:5rem;font-weight:800;color:#fff;margin:20px 0;letter-spacing:4px}
.timer-num.warn{color:var(--orange)}.timer-num.danger{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.timer-presets{display:flex;gap:12px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.tpreset{padding:10px 20px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04);font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;font-size:.9rem;color:var(--textl)}
.tpreset:hover,.tpreset.on{border-color:var(--gold);background:rgba(244,185,66,.08);color:#fff}
.timer-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* Stop Check */
.stop-banner{background:linear-gradient(135deg,rgba(231,76,60,.15),rgba(192,57,43,.1));border:1px solid rgba(231,76,60,.3);color:#fff;border-radius:14px;padding:22px;margin:16px 0;text-align:center}
.stop-banner h3{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;margin-bottom:8px;color:#fff}
.checks{display:flex;flex-direction:column;gap:8px;margin-top:14px;text-align:left;max-width:480px;margin-left:auto;margin-right:auto}
.chk{display:flex;align-items:center;gap:12px;font-weight:500;font-size:1rem;color:#e8e8f0}
.chk input{width:22px;height:22px;accent-color:var(--gold);flex-shrink:0}

/* If-Then */
.ift{background:var(--card);border-radius:14px;border:1px solid var(--card-border);overflow:hidden;margin:16px 0;transition:all .3s}
.ift:hover{border-color:rgba(244,185,66,.2)}
.ift-if{background:linear-gradient(135deg,rgba(231,76,60,.2),rgba(192,57,43,.15));color:#fff;padding:16px 22px;font-weight:700;font-size:1rem;border-bottom:1px solid rgba(231,76,60,.2)}
.ift-body{padding:16px 22px}
.ift-bad{background:rgba(231,76,60,.08);border-left:3px solid var(--red);padding:12px 16px;margin:8px 0;border-radius:0 10px 10px 0;font-size:.9rem;color:#ff8a80}
.ift-good{background:rgba(46,204,113,.08);border-left:3px solid var(--green);padding:12px 16px;margin:8px 0;border-radius:0 10px 10px 0;font-size:.9rem;color:#81ecb0}
.ift-label{font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}

/* Quote */
.quote-box{background:linear-gradient(135deg,rgba(244,185,66,.06),rgba(244,185,66,.02));border:1px solid rgba(244,185,66,.15);border-radius:14px;padding:24px;text-align:center;margin:16px 0}
.quote-box .qt{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:600;font-style:italic;line-height:1.6;margin-bottom:8px;color:#fff}
.quote-box .au{font-size:.82rem;opacity:.4;color:var(--gold)}

/* Checklist */
.cklist{list-style:none;padding:0}
.cklist li{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:1rem;line-height:1.6;color:var(--text)}
.cklist li:last-child{border-bottom:none}
.cklist input{width:22px;height:22px;margin-top:2px;accent-color:var(--green);flex-shrink:0;cursor:pointer}

/* Word Attack Steps */
.step-list{list-style:none;padding:0}
.step-list li{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);align-items:flex-start;font-size:1rem;color:var(--text)}
.step-num{background:var(--gold);color:#0a0a1a;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}

/* Estimate */
.est-input{width:80px;padding:10px;border:1px solid rgba(255,255,255,.15);border-radius:10px;text-align:center;font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;background:rgba(255,255,255,.04);color:#fff}
.est-input:focus{border-color:var(--gold);outline:none}

/* Select dropdown dark theme */
#weekSelect option{background:#141428;color:#fff}

/* Responsive */
@media(max-width:600px){.banner h1{font-size:1.1rem}.timer-num{font-size:3.5rem}.card{padding:20px}.profile-card{padding:28px 34px;min-width:160px}.profile-card .avatar{font-size:3.5rem}.block-link{padding:8px 14px;font-size:.82rem}.day-btn{width:50px;height:42px;font-size:.78rem}}
.fade{animation:fadeIn .35s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- PROFILE SELECTOR -->
<div class="profile-screen" id="profileScreen">
  <h1>CORDOVA SUMMER SCHOOL 2026</h1>
  <p>Who's logging in today?</p>
  <div class="profile-cards">
    <div class="profile-card" onclick="selectProfile('cristopher')">
      <div class="avatar">🚀</div>
      <div class="name">Cristopher</div>
      <div class="grade">Rising 7th Grade</div>
    </div>
    <div class="profile-card" onclick="selectProfile('judah')">
      <div class="avatar">🦁</div>
      <div class="name">Judah</div>
      <div class="grade">Rising 4th Grade</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <div class="banner">
    <div>
      <h1 id="bannerName">SUMMER SCHOOL</h1>
      <div class="sub" id="bannerDate"></div>
    </div>
    <div class="banner-right">
      <select id="weekSelect" onchange="changeWeek(this.value)" style="padding:6px 12px;border-radius:8px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer">
        <option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option><option value="4">Week 4</option><option value="5">Week 5</option>
        <option value="6">Week 6</option><option value="7">Week 7</option><option value="8">Week 8</option><option value="9">Week 9</option><option value="10">Week 10</option>
        <option value="11">Week 11</option><option value="12">Week 12</option>
      </select>
      <button class="switch-btn" onclick="switchProfile()">Switch User</button>
    </div>
  </div>

  <div class="nav" id="navBar"></div>
  <div class="main" id="mainContent"></div>
</div>

<script>
// ══════════════════════════════════
// CURRICULUM DATA
// ══════════════════════════════════
const DATA = {
cristopher: {
  name: "Cristopher", emoji: "🚀", title: "CRISTOPHER'S SUMMER SCHOOL",
  subtitle: "Your brain is fast. This helps it be fast AND accurate.",
  hasEF: true,
  weeks: [
    {theme:"Launch & Baseline",code:"The Phantom Reader",
     reading:{desc:"Introduce STOP & CHECK: read a sentence, pause, say it back. Use Star Wars junior novel or a book at your Lexile level (951L). Read 2 pages aloud daily.",links:[{label:"Open IXL Reading",url:"https://www.ixl.com/ela",cls:"link-ixl"},{label:"Open Epic! Library",url:"https://www.getepic.com",cls:"link-epic"}]},
     writing:{desc:"Sentence Scramble: Rearrange mixed-up Star Wars sentences into correct order. Practice retelling scenes using 'First... Then... Finally...' Write 3 sentences in journal.",links:[{label:"Open IXL Language Arts",url:"https://www.ixl.com/ela",cls:"link-ixl"},{label:"Goblin Tools",url:"https://goblin.tools",cls:"link-other"}]},
     math:{desc:"Times tables fluency check — identify gaps. Use F1 lap time scenarios: 'If each lap is 87 seconds and there are 5 laps, how long is the race?'",links:[{label:"Open IXL Math",url:"https://www.ixl.com/math",cls:"link-ixl"},{label:"Khan Academy Math",url:"https://www.khanacademy.org/math",cls:"link-khan"}]},
     project:{desc:"Build a reading nook / 'Jedi Study Temple.' Set up your summer workspace. Make it yours!",links:[]},
     typing:{desc:"Start with Typing.com lesson 1 — learn home row keys. Then try NitroType for fun.",links:[{label:"Typing.com",url:"https://www.typing.com",cls:"link-typing"},{label:"NitroType",url:"https://www.nitrotype.com",cls:"link-typing"}]},
     experiment:"Baking Soda & Vinegar Volcano — build it, erupt it, write a Jedi field report!"},
    {theme:"Word Attack",code:"Decoding Droids",
     reading:{desc:"Syllable breaking: practice chunking longer words (con-grat-u-la-tions). Use animal encyclopedia — read entries, circle any word you'd normally skip.",links:[{label:"Open IXL Reading",url:"https://www.ixl.com/ela",cls:"link-ixl"},{label:"Open Epic! Library",url:"https://www.getepic.com",cls:"link-epic"}]},
     writing:{desc:"Daily journal: 3 sentences about yesterday. Use the WHO/WHAT/WHERE/WHEN/WHY checklist before writing to make sure context is included.",links:[{label:"Open IXL Language Arts",url:"https://www.ixl.com/ela",cls:"link-ixl"}]},
     math:{desc:"Long division with animal population data. 'If 1,248 sea turtles split into 6 groups, how many in each group?'",links:[{label:"Open IXL Math",url:"https://www.ixl.com/math",cls:"link-ixl"},{label:"Khan Academy Math",url:"https://www.khanacademy.org/math",cls:"link-khan"}]},
     project:{desc:"DIY cardboard R2-D2 build — follow written instructions. Reading comprehension in disguise!",links:[{label:"Scratch Coding",url:"https://scratch.mit.edu",cls:"link-scratch"}]},
     typing:{desc:"Typing.com lesson + TypeRacer Star Wars mode!",links:[{label:"Typing.com",url:"https://www.typing.com",cls:"link-typing"},{label:"TypeRacer",url:"https://play.typeracer.com/?universe=starwars",cls:"link-typing"}]},
     experiment:"Seed Growth Journal — plant seeds, measure daily, create an F1-style growth leaderboard"},
    {theme:"Context Clues",code:"The Clue Hunter",
     reading:{desc:"Context clue strategies: reread the sentence, look at surrounding sentences, use pictures. Practice with F1 articles or animal facts at your level.",links:[{label:"Open IXL Reading",url:"https://www.ixl.com/ela",cls:"link-ixl"},{label:"Open Epic! Library",url:"https://www.getepic.com",cls:"link-epic"}]},
     writing:{desc:"Expand sentences: Start with 'The car raced.' Add who, where, when, why, how. Build to 3-4 sentence paragraphs about F1 races.",links:[{label:"Open IXL Language Arts",url:"https://www.ixl.com/ela",cls:"link-ixl"}]},
     math:{desc:"Word problems: underline key info, cross out extras, draw pictures. 'A cheetah runs 70mph. A gazelle runs 50mph. How much faster?'",links:[{label:"Open IXL Math",url:"https://www.ixl.com/math",cls:"link-ixl"},{label:"Khan Academy Math",url:"https://www.khanacademy.org/math",cls:"link-khan"}]},
     project:{desc:"Make a density tower experiment. Write a lab report using the template: Question, Prediction, Materials, Steps, Result.",links:[]},
     typing:{desc:"Typing.com + NitroType races",links:[{label:"Typing.com",url:"https://www.typing.com",cls:"link-typing"},{label:"NitroType",url:"https://www.nitrotype.com",cls:"link-typing"}]},

..",b:"7th grade Cristopher walks in behind. He struggles. He wishes summer-him had practiced.",g:"Every block now makes 7th grade EASIER. I'm building skills that make school less stressful."},{i:"I get to choose between fun NOW or finishing my last block...",b:"If I choose fun: I'll think about unfinished work the whole time. Not really fun.",g:"30 more minutes, then ACTUALLY free. No guilt, no cloud. Future Me thanks Past Me."}]];

// ═══ State ═══
let profile = null, week = 1, day = 'mon';
let checkedBlocks = new Set();
let timerSec = 1800, timerTotal = 1800, timerInt = null, timerOn = false;

// Auto-detect today's day of week
function autoDetectDay() {
  const jsDay = new Date().getDay(); // 0=Sun, 1=Mon...
  if (jsDay >= 1 && jsDay <= 5) day = DAY_KEYS[jsDay - 1];
  else day = 'mon'; // default to Monday on weekends
}

// ═══ Profile ═══
function selectProfile(p) {
  profile = p;
  autoDetectDay();
  document.getElementById('profileScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const d = DATA[p];
  document.getElementById('bannerName').textContent = d.title;
  document.getElementById('bannerDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  buildNav();
  changeWeek(1);
  showSec('checkin'); // Check-in is ALWAYS the landing page
}
function switchProfile() {
  document.getElementById('profileScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  if(timerInt) clearInterval(timerInt);
  timerOn = false;
  checkedBlocks = new Set();
}

// ═══ Nav ═══
function buildNav() {
  const d = DATA[profile];
  let tabs = [
    {id:'checkin',icon:'☀️',label:'Check-In'},
    {id:'today',icon:'📋',label:"Today's Plan"},
  ];
  if(d.hasEF) tabs.push({id:'stopcheck',icon:'🛑',label:'STOP & CHECK'},{id:'ifthen',icon:'🔀',label:'If → Then'});
  tabs.push({id:'timer',icon:'⏱️',label:'Timer'},{id:'wrapup',icon:'🏁',label:'Wrap-Up'});
  const nav = document.getElementById('navBar');
  nav.innerHTML = tabs.map((t,i) =>
    `<button onclick="showSec('${t.id}')" class="${i===0?'active':''}" data-sec="${t.id}">${t.icon} ${t.label}</button>`
  ).join('');
}
function showSec(id) {
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('sec-'+id);
  if(el) el.classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>{b.classList.toggle('active',b.dataset.sec===id)});
  window.scrollTo(0,0);
}

// ═══ Week / Day Change ═══
function changeWeek(w) {
  week = parseInt(w);
  document.getElementById('weekSelect').value = w;
  checkedBlocks = new Set();
  renderAll();
}
function changeDay(d) {
  day = d;
  checkedBlocks = new Set();
  renderAll();
  showSec('today');
}

// ═══ Block check toggling ═══
function toggleBlock(key) {
  if (checkedBlocks.has(key)) checkedBlocks.delete(key);
  else checkedBlocks.add(key);
  updateProgressUI();
  // Toggle the visual state of the block item
  const el = document.getElementById('block-' + key);
  if (el) el.classList.toggle('done', checkedBlocks.has(key));
  // Show/hide finish button
  updateFinishBtn();
}

function getTodayBlocks() {
  return DAILY_SCHED[day].blocks;
}

function updateProgressUI() {
  const blocks = getTodayBlocks();
  const total = blocks.length;
  const done = blocks.filter(b => checkedBlocks.has(b)).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const fill = document.getElementById('progressFill');
  const pctEl = document.getElementById('progressPct');
  const label = document.getElementById('progressLabel');
  if (fill) {
    fill.style.width = pct + '%';
    fill.classList.toggle('complete', pct === 100);
  }
  if (pctEl) pctEl.textContent = pct + '%';
  if (label) label.textContent = done + ' of ' + total + ' blocks done';
}

function updateFinishBtn() {
  const blocks = getTodayBlocks();
  const allDone = blocks.every(b => checkedBlocks.has(b));
  const btn = document.getElementById('finishDayBtn');
  if (btn) {
    btn.classList.toggle('hidden', false);
    if (allDone) {
      btn.className = 'btn btn-gold btn-lg';
      btn.innerHTML = '🏁 All Done! Finish the Day →';
    } else {
      btn.className = 'btn btn-outline btn-lg';
      btn.innerHTML = '⏩ Skip to Wrap-Up →';
    }
  }
}

// ═══ RENDER ═══
function renderAll() {

  function getSpecificLinks(subject) {

  // Render each block for today
  blocks.forEach(key => {

    html += `<div class="step-nav"><button class="btn btn-outline" onclick="showSec('stopcheck')">← STOP & CHECK</button><button class="btn btn-blue" onclick="showSec('today')">Back to Today's Plan →</button></div>`;

  html += `<div class="timer-btns"><button class="btn btn-green btn-lg" id="tBtn" onclick="togTm()">▶ Start</button><button class="btn btn-outline" onclick="rstTm()">↺ Reset</button></div>`;

  // ═══ WRAP-UP ═══

  if(d.hasEF){
    html += `<h3 style="margin-top:20px">End of Day Reflection</h3>`;
    html += `<div class="prompt"><div class="q">What did Future ${d.name} appreciate about today?</div><textarea placeholder="Because I did my work today..."></textarea></div>`;
    html += `<div class="prompt"><div class="q">One thing I'm proud of:</div><textarea placeholder="I'm proud that I..."></textarea></div>`;
    html += `<h3>Tomorrow Prep</h3><ul class="cklist">`;
    ['Device is charging','Notebook + pencil at station','I know what I\'m working on tomorrow','Workspace is clean'].forEach(item => {
      html += `<li><input type="checkbox"><label>${item}</label></li>`;
    });
    html += `</ul>`;
  }
  html += `<div style="text-align:center;margin-top:24px"><button class="btn btn-gold btn-lg" onclick="dayDone()">✨ Done for today!</button></div>`;
  html += `<div id="dayDoneMsg" class="hidden" style="text-align:center;margin-top:20px;padding:28px;background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);border-radius:16px">`;
  html += `<div style="font-size:3rem">🏆</div><h3 style="color:var(--green);font-family:'Space Grotesk',sans-serif;font-size:1.5rem;margin:12px 0">Amazing work, ${d.name}!</h3>`;
  html += `<p style="color:var(--textl);margin:0">Every day you show up, you get stronger. See you tomorrow!</p></div>`;
  html += `<div class="step-nav"><button class="btn btn-outline" onclick="showSec('today')">← Back to Today's Plan</button><div></div></div>`;
  html += `</div></div>`;

  main.innerHTML = html;
  timerSec = 1800; timerTotal = 1800;
}

// ═══ Timer ═══
function setTm(m,el){if(timerOn)return;timerSec=m*60;timerTotal=m*60;updTm();document.querySelectorAll('.tpreset').forEach(p=>p.classList.remove('on'));if(el)el.classList.add('on')}
function updTm(){const m=Math.floor(timerSec/60),s=timerSec%60,d=document.getElementById('tDisp');if(!d)return;d.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;d.className='timer-num';if(timerSec<=60&&timerSec>0)d.classList.add('danger');else if(timerSec<=300&&timerSec>0)d.classList.add('warn')}
function togTm(){const btn=document.getElementById('tBtn');if(!btn)return;if(timerOn){clearInterval(timerInt);timerOn=false;btn.innerHTML='▶ Resume';btn.className='btn btn-green btn-lg'}else{timerOn=true;btn.innerHTML='⏸ Pause';btn.className='btn btn-gold btn-lg';timerInt=setInterval(()=>{timerSec--;updTm();if(timerSec<=0){clearInterval(timerInt);timerOn=false;btn.innerHTML='▶ Start';btn.className='btn btn-green btn-lg';const dm=document.getElementById('tDone');if(dm)dm.classList.remove('hidden');document.title='🎉 DONE! — Summer School'}},1000)}}
function rstTm(){clearInterval(timerInt);timerOn=false;timerSec=timerTotal;updTm();const btn=document.getElementById('tBtn');if(btn){btn.innerHTML='▶ Start';btn.className='btn btn-green btn-lg'}const dm=document.getElementById('tDone');if(dm)dm.classList.add('hidden')}

// ═══ Time Compare ═══
function cmpTime(){
  const a=parseInt(document.getElementById('actTime')?.value)||0;
  const el=document.getElementById('cmpResult');
  if(!a||!el)return;
  const blocks = getTodayBlocks();
  // Estimate expected time based on blocks
  const timeMap = {typing:12, reading:28, writing:28, math:28, project:30, experiment:35, spanish:18};
  const expected = blocks.reduce((sum,b) => sum + (timeMap[b]||25), 0);
  const d=Math.abs(expected-a);
  if(d<=10) el.innerHTML=`<span style="background:rgba(46,204,113,.1);color:var(--green);padding:8px 16px;border-radius:16px;font-weight:600;display:inline-block">🎯 Within ${d} min of the ~${expected} min estimate! Sharp!</span>`;
  else if(d<=25) el.innerHTML=`<span style="background:rgba(243,156,18,.1);color:var(--orange);padding:8px 16px;border-radius:16px;font-weight:600;display:inline-block">Off by ${d} min from ~${expected} min estimate. ${a>expected?'Took longer than expected.':'Faster!'} Getting better at estimating!</span>`;
  else el.innerHTML=`<span style="background:rgba(231,76,60,.1);color:var(--red);padding:8px 16px;border-radius:16px;font-weight:600;display:inline-block">Off by ${d} min from ~${expected} min estimate. Now you know for next time!</span>`;
}

// ═══ Day Done ═══
function dayDone(){const m=document.getElementById('dayDoneMsg');if(m){m.classList.remove('hidden');m.scrollIntoView({behavior:'smooth'})}}
</script>
